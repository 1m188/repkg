name: Build (C#)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: dotnet build -c Release

      - name: Publish
        run: dotnet publish RePKG/RePKG.csproj -c Release -o publish

      - uses: actions/upload-artifact@v4
        with:
          name: repkg-cs-windows
          path: publish/
