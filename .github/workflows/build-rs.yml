name: Build (Rust)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 构建
        working-directory: rs
        run: cargo build --release --target ${{ matrix.target }}

      - name: 打包产物
        shell: bash
        run: |
          cp "rs/target/${{ matrix.target }}/release/repkg${{ matrix.ext }}" .

      - uses: actions/upload-artifact@v4
        with:
          name: repkg-${{ matrix.os }}-${{ matrix.target }}
          path: repkg${{ matrix.ext }}
